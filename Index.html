</head>
<body class="theme-candy">

    <div id="start-screen">
        <h1 style="font-size: 3rem; margin-bottom: 10px; text-align: center;">Rainbow<br>Connect</h1>
        <p style="font-size: 1.1rem; margin-bottom: 30px; opacity: 0.8; max-width: 80%; text-align: center;">
            Connect colors in a single stroke!<br>If you lift your finger before connecting, the path will erase!
        </p>
        <button id="btn-start" style="font-size: 1.5rem; padding: 15px 40px;">Play</button>
    </div>

    <div id="header">
        <h1 id="level-text">Level 1</h1>
        <div id="theme-indicator">Candy Theme</div>
    </div>

    <div id="game-container">
        <canvas id="gameCanvas"></canvas>
        <div id="overlay">
            <h2>Perfect!</h2>
            <button id="btn-next">Next Level</button>
        </div>
    </div>

    <div id="controls">
        <button id="btn-reset">Reset Level</button>
    </div>

<script>
/**
 * AUDIO SYNTHESIS ENGINE
 */
const AudioEngine = {
    ctx: null,
    notes: [261.63, 329.63, 392.00, 523.25, 392.00, 329.63], 
    noteIdx: 0,
    bgmInterval: null,

    init() {
        if (!this.ctx) this.ctx = new (window.AudioContext || window.webkitAudioContext)();
        if (this.ctx.state === 'suspended') this.ctx.resume();
    },

    playTone(freq, type, duration, vol) {
        if (!this.ctx) return;
        const osc = this.ctx.createOscillator();
        const gain = this.ctx.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(freq, this.ctx.currentTime);
        gain.gain.setValueAtTime(vol, this.ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + duration);
        osc.connect(gain);
        gain.connect(this.ctx.destination);
        osc.start();
        osc.stop(this.ctx.currentTime + duration);
    },

    startBGM() {
        if (this.bgmInterval) return;
        this.bgmInterval = setInterval(() => {
            if (GameState.isWon) return; 
            this.playTone(this.notes[this.noteIdx], 'sine', 2.0, 0.03);
            this.noteIdx = (this.noteIdx + 1) % this.notes.length;
        }, 1500);
    },

    playPop() { this.playTone(800, 'sine', 0.1, 0.1); },
    playErase() { this.playTone(150, 'sawtooth', 0.15, 0.05); },
    playWin() {
        setTimeout(() => this.playTone(440, 'sine', 0.3, 0.1), 0);
        setTimeout(() => this.playTone(554.37, 'sine', 0.3, 0.1), 150);
        setTimeout(() => this.playTone(659.25, 'sine', 0.6, 0.1), 300);
    }
};

/**
 * GAME DATA & PROCEDURAL GENERATOR
 */
const COLORS = ['#FF3B30', '#007AFF', '#34C759', '#FFCC00', '#AF52DE', '#FF9500', '#5AC8FA', '#FF2D55'];
const THEMES = [
    { name: 'Candy', class: 'theme-candy' },
    { name: 'Space', class: 'theme-space' },
    { name: 'Jungle', class: 'theme-jungle' }
];

const GameState = {
    level: 0,
    currentPairs: [],
    paths: {}, 
    activeColor: null,
    isWon: false,
    particles: [],
    ballRadius: 0.06,
    pathRadius: 0.025
};

// Generates logically solvable puzzles scaling from level 1 up to level 50 (and beyond)
function generateProceduralLevel(levelIdx) {
    // Determine difficulty parameters based on level
    let numColors, gridSize;
    if (levelIdx < 5) { numColors = 3; gridSize = 4; }
    else if (levelIdx < 10) { numColors = 4; gridSize = 4; }
    else if (levelIdx < 20) { numColors = 4; gridSize = 5; }
    else if (levelIdx < 30) { numColors = 5; gridSize = 5; }
    else if (levelIdx < 40) { numColors = 6; gridSize = 6; }
    else { numColors = 7; gridSize = 7; } // Level 40-50+ scaling

    // Adjust sizes dynamically for tighter higher-level grids
    GameState.ballRadius = Math.max(0.035, 0.065 - (gridSize * 0.005));
    GameState.pathRadius = GameState.ballRadius * 0.45;

    let grid = Array(gridSize).fill(0).map(() => Array(gridSize).fill(-1));
    let pairs = [];

    // Valid moves on grid
    const getNeighbors = (r, c) => {
        let n = [];
        if (r > 0) n.push([r-1, c]);
        if (r < gridSize-1) n.push([r+1, c]);
        if (c > 0) n.push([r, c-1]);
        if (c < gridSize-1) n.push([r, c+1]);
        return n.filter(([nr, nc]) => grid[nr][nc] === -1);
    };

    // Draw random paths on grid to guarantee a solvable layout
    for (let c = 0; c < numColors; c++) {
        let empty = [];
        for (let r=0; r<gridSize; r++) {
            for (let col=0; col<gridSize; col++) {
                if (grid[r][col] === -1) empty.push([r,col]);
            }
        }
        if (empty.length < 2) break;

        let start = empty[Math.floor(Math.random() * empty.length)];
        let path = [start];
        grid[start[0]][start[1]] = c;
        
        let curr = start;
        let walkLen = Math.floor(Math.random() * gridSize) + 2; 

        for (let step=0; step<walkLen; step++) {
            let neighbors = getNeighbors(curr[0], curr[1]);
            if (neighbors.length === 0) break;
            let next = neighbors[Math.floor(Math.random() * neighbors.length)];
            path.push(next);
            grid[next[0]][next[1]] = c;
            curr = next;
        }

        if (path.length > 1) {
            let end = path[path.length-1];
            // Map to canvas coordinates (0.1 to 0.9) adding slight organic jitter
            let step = 0.8 / Math.max(gridSize - 1, 1);
            let jitter = () => (Math.random() * 0.03 - 0.015);
            
            pairs.push({
                c: c,
                p1: { x: Math.max(0.08, Math.min(0.92, 0.1 + start[1] * step + jitter())), y: Math.max(0.08, Math.min(0.92, 0.1 + start[0] * step + jitter())) },
                p2: { x: Math.max(0.08, Math.min(0.92, 0.1 + end[1] * step + jitter())), y: Math.max(0.08, Math.min(0.92, 0.1 + end[0] * step + jitter())) }
            });
        } else {
            grid[start[0]][start[1]] = -1; // Undo if trapped immediately
        }
    }

    // Failsafe: Re-roll if it was heavily trapped
    if (pairs.length < 2 && numColors >= 2) return generateProceduralLevel(levelIdx);
    return pairs;
}

/**
 * CORE ENGINE
 */
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const uiOverlay = document.getElementById('overlay');

function resize() {
    const container = document.getElementById('game-container');
    const rect = container.getBoundingClientRect();
    canvas.width = rect.width;
    canvas.height = rect.height;
    draw();
}
window.addEventListener('resize', resize);

function loadLevel(lvIdx) {
    GameState.level = lvIdx;
    GameState.paths = {};
    GameState.activeColor = null;
    GameState.isWon = false;
    GameState.particles = [];
    
    // Generate new solvable board
    GameState.currentPairs = generateProceduralLevel(lvIdx);
    
    // Set Theme
    const themeIdx = Math.floor(lvIdx / 5) % THEMES.length;
    document.body.className = THEMES[themeIdx].class;
    
    document.getElementById('level-text').innerText = `Level ${lvIdx + 1}`;
    document.getElementById('theme-indicator').innerText = THEMES[themeIdx].name;
    uiOverlay.classList.remove('active');
    
    draw();
}

/**
 * MATH & COLLISION
 */
function dist(p1, p2) {
    return Math.sqrt(Math.pow(p1.x - p2.x, 2) + Math.pow(p1.y - p2.y, 2));
}

function distToSegment(p, v, w) {
    let l2 = Math.pow(v.x - w.x, 2) + Math.pow(v.y - w.y, 2);
    if (l2 === 0) return dist(p, v);
    let t = ((p.x - v.x) * (w.x - v.x) + (p.y - v.y) * (w.y - v.y)) / l2;
    t = Math.max(0, Math.min(1, t));
    return dist(p, { x: v.x + t * (w.x - v.x), y: v.y + t * (w.y - v.y) });
}

function segmentsIntersect(p1, p2, p3, p4) {
    let det, gamma, lambda;
    det = (p2.x - p1.x) * (p4.y - p3.y) - (p4.x - p3.x) * (p2.y - p1.y);
    if (det === 0) return false;
    lambda = ((p4.y - p3.y) * (p4.x - p1.x) + (p1.x - p4.x) * (p4.y - p1.y)) / det;
    gamma = ((p1.y - p2.y) * (p4.x - p1.x) + (p2.x - p1.x) * (p4.y - p1.y)) / det;
    return (0 < lambda && lambda < 1) && (0 < gamma && gamma < 1);
}

function isValidMove(newPt) {
    const activePath = GameState.paths[GameState.activeColor];
    if (!activePath || activePath.length < 1) return true;
    const lastPt = activePath[activePath.length - 1];

    for (let c in GameState.paths) {
        c = parseInt(c);
        if (c === GameState.activeColor) continue;
        const otherPath = GameState.paths[c];
        
        for (let i = 0; i < otherPath.length; i++) {
            // Proximity + Crossing checks
            if (distToSegment(otherPath[i], lastPt, newPt) < GameState.pathRadius * 2) return false;
            if (i > 0 && segmentsIntersect(lastPt, newPt, otherPath[i-1], otherPath[i])) return false;
        }
    }

    for (let pair of GameState.currentPairs) {
        if (pair.c === GameState.activeColor) continue;
        if (distToSegment(pair.p1, lastPt, newPt) < GameState.ballRadius * 1.5) return false;
        if (distToSegment(pair.p2, lastPt, newPt) < GameState.ballRadius * 1.5) return false;
    }

    return true;
}

function isPathComplete(color) {
    const path = GameState.paths[color];
    if (!path || path.length < 2) return false;
    
    const pair = GameState.currentPairs.find(p => p.c === parseInt(color));
    if (!pair) return false;
    
    // Increased tolerance to 0.02 to ensure snapping resolves correctly
    const startDist1 = dist(path[0], pair.p1);
    const startDist2 = dist(path[0], pair.p2);
    const endDist1 = dist(path[path.length-1], pair.p1);
    const endDist2 = dist(path[path.length-1], pair.p2);

    return (startDist1 < 0.02 && endDist2 < 0.02) || (startDist2 < 0.02 && endDist1 < 0.02);
}

function checkWin() {
    for (let pair of GameState.currentPairs) {
        if (!isPathComplete(pair.c)) return false;
    }

    GameState.isWon = true;
    AudioEngine.playWin();
    uiOverlay.classList.add('active');
    spawnConfetti();
}

/**
 * INPUT HANDLING
 */
function getNormalizedPos(e) {
    const rect = canvas.getBoundingClientRect();
    let clientX = e.touches ? e.touches[0].clientX : e.clientX;
    let clientY = e.touches ? e.touches[0].clientY : e.clientY;
    return {
        x: (clientX - rect.left) / rect.width,
        y: (clientY - rect.top) / rect.height
    };
}

function handleStart(e) {
    e.preventDefault();
    if (GameState.isWon) return;
    AudioEngine.init();

    const pos = getNormalizedPos(e);
    for (let pair of GameState.currentPairs) {
        if (dist(pos, pair.p1) < GameState.ballRadius * 1.5) {
            GameState.activeColor = pair.c;
            GameState.paths[pair.c] = [{ x: pair.p1.x, y: pair.p1.y }];
            return draw();
        }
        if (dist(pos, pair.p2) < GameState.ballRadius * 1.5) {
            GameState.activeColor = pair.c;
            GameState.paths[pair.c] = [{ x: pair.p2.x, y: pair.p2.y }];
            return draw();
        }
    }
}

function handleMove(e) {
    e.preventDefault();
    if (GameState.activeColor === null || GameState.isWon) return;

    const pos = getNormalizedPos(e);
    const path = GameState.paths[GameState.activeColor];
    const lastPt = path[path.length - 1];

    if (dist(pos, lastPt) < 0.015) return; // Min move dist

    const pair = GameState.currentPairs.find(p => p.c === GameState.activeColor);
    const targetPt = (dist(path[0], pair.p1) < 0.02) ? pair.p2 : pair.p1;

    // Soft magnet snap to target
    if (dist(pos, targetPt) < GameState.ballRadius * 1.5) {
        if (isValidMove(targetPt)) {
            path.push({ x: targetPt.x, y: targetPt.y });
            AudioEngine.playPop();
            handleEnd(e); // Force end which locks in the completed path
            return;
        }
    }

    if (isValidMove(pos)) {
        path.push(pos);
        draw();
    }
}

function handleEnd(e) {
    if(e) e.preventDefault();
    if (GameState.activeColor !== null) {
        
        // CRUCIAL MECHANIC: If path isn't connected to the end ball, delete it!
        if (!isPathComplete(GameState.activeColor)) {
            delete GameState.paths[GameState.activeColor];
            AudioEngine.playErase();
        }
        
        GameState.activeColor = null;
        draw();
        checkWin();
    }
}

// Event Listeners
canvas.addEventListener('touchstart', handleStart, {passive: false});
canvas.addEventListener('touchmove', handleMove, {passive: false});
canvas.addEventListener('touchend', handleEnd, {passive: false});
canvas.addEventListener('touchcancel', handleEnd, {passive: false});

canvas.addEventListener('mousedown', handleStart);
canvas.addEventListener('mousemove', handleMove);
window.addEventListener('mouseup', handleEnd);
canvas.addEventListener('mouseleave', handleEnd); // Lift mouse off canvas area

/**
 * RENDERING
 */
function draw() {
    if (!ctx) return;
    const w = canvas.width;
    const h = canvas.height;
    
    ctx.clearRect(0, 0, w, h);

    // Paths
    for (let c in GameState.paths) {
        const path = GameState.paths[c];
        if (path.length < 2) continue;

        ctx.beginPath();
        ctx.moveTo(path[0].x * w, path[0].y * h);
        
        for (let i = 1; i < path.length; i++) {
            if (i < path.length - 1) {
                let xc = (path[i].x + path[i+1].x) / 2 * w;
                let yc = (path[i].y + path[i+1].y) / 2 * h;
                ctx.quadraticCurveTo(path[i].x * w, path[i].y * h, xc, yc);
            } else {
                ctx.lineTo(path[i].x * w, path[i].y * h);
            }
        }

        ctx.strokeStyle = COLORS[parseInt(c)];
        ctx.lineWidth = GameState.pathRadius * 2 * w;
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';
        
        if (document.body.classList.contains('theme-space')) {
            ctx.shadowBlur = 15;
            ctx.shadowColor = COLORS[parseInt(c)];
        }
        
        ctx.stroke();
        ctx.shadowBlur = 0;
    }

    // Balls
    for (let pair of GameState.currentPairs) {
        drawBall(pair.p1.x * w, pair.p1.y * h, GameState.ballRadius * w, COLORS[pair.c]);
        drawBall(pair.p2.x * w, pair.p2.y * h, GameState.ballRadius * w, COLORS[pair.c]);
    }
}

function drawBall(x, y, r, color) {
    ctx.beginPath();
    ctx.arc(x, y, r, 0, Math.PI * 2);
    let gradient = ctx.createRadialGradient(x - r/3, y - r/3, r/10, x, y, r);
    gradient.addColorStop(0, '#ffffff');
    gradient.addColorStop(0.2, color);
    gradient.addColorStop(1, '#00000055'); 
    
    ctx.fillStyle = gradient;
    ctx.shadowBlur = 5;
    ctx.shadowColor = 'rgba(0,0,0,0.3)';
    ctx.fill();
    ctx.shadowBlur = 0;
}

/**
 * EFFECTS & UI
 */
function spawnConfetti() {
    for (let i = 0; i < 80; i++) {
        GameState.particles.push({
            x: Math.random() * window.innerWidth,
            y: -20,
            vx: (Math.random() - 0.5) * 10,
            vy: Math.random() * 5 + 2,
            color: COLORS[Math.floor(Math.random() * COLORS.length)],
            size: Math.random() * 10 + 5,
            rot: Math.random() * 360,
            rotSpeed: (Math.random() - 0.5) * 10
        });
    }
    animateConfetti();
}

function animateConfetti() {
    if (!GameState.isWon) return; 
    let ccv = document.getElementById('confettiCanvas');
    if (!ccv) {
        ccv = document.createElement('canvas');
        ccv.id = 'confettiCanvas';
        ccv.style.position = 'absolute';
        ccv.style.top = '0'; ccv.style.left = '0';
        ccv.style.pointerEvents = 'none';
        ccv.style.zIndex = '15';
        document.body.appendChild(ccv);
    }
    ccv.width = window.innerWidth;
    ccv.height = window.innerHeight;
    const cctx = ccv.getContext('2d');
    cctx.clearRect(0, 0, ccv.width, ccv.height);

    for (let i = GameState.particles.length - 1; i >= 0; i--) {
        let p = GameState.particles[i];
        p.x += p.vx; p.y += p.vy; p.rot += p.rotSpeed; p.vy += 0.1;

        cctx.save();
        cctx.translate(p.x, p.y);
        cctx.rotate(p.rot * Math.PI / 180);
        cctx.fillStyle = p.color;
        cctx.fillRect(-p.size/2, -p.size/2, p.size, p.size);
        cctx.restore();

        if (p.y > window.innerHeight + 20) GameState.particles.splice(i, 1);
    }

    if (GameState.particles.length > 0) requestAnimationFrame(animateConfetti);
    else if(ccv) ccv.remove();
}

// UI Triggers
document.getElementById('btn-start').addEventListener('click', () => {
    document.getElementById('start-screen').style.display = 'none';
    AudioEngine.init();
    AudioEngine.startBGM();
    resize();
    loadLevel(0);
});

document.getElementById('btn-reset').addEventListener('click', () => {
    AudioEngine.playErase();
    loadLevel(GameState.level); // Reloads identical level (will generate new board though)
    let ccv = document.getElementById('confettiCanvas');
    if(ccv) ccv.remove();
});

document.getElementById('btn-next').addEventListener('click', () => {
    loadLevel(GameState.level + 1);
    let ccv = document.getElementById('confettiCanvas');
    if(ccv) ccv.remove();
});

</script>
</body>
</html>
